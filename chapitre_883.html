  function loadGoogleAnalytics() {

        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || (e.ctrlKey && (e.key === 'u' || e.key === 'c' || e.key === 's'))) {
                e.preventDefault();
                return false;
            }
        });
    </script>
