  // ID Google Analytics
  const GA_ID = 'G-439MVFEEK5';

  // Fonction pour charger le script Google (uniquement si accepté)
  function loadGoogleAnalytics() {
    var script = document.createElement('script');
    script.async = true;

        }

        document.onselectstart = function() { return false; };
        document.ondragstart = function() { return false; };
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || (e.ctrlKey && (e.key === 'u' || e.key === 'c' || e.key === 's'))) {
                e.preventDefault();
                return false;
            }
        });
    </script>
</body>
</html>
